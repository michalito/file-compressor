name: Deploy To Dokploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dokploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -r requirements-upscaler.txt
          pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Run backend test suite
        run: python3 -m pytest -q

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image names
        id: image-meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$owner/file-compressor-web" >> "$GITHUB_OUTPUT"
          echo "upscaler_image=ghcr.io/$owner/file-compressor-upscaler" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web-runtime
          push: true
          tags: |
            ${{ steps.image-meta.outputs.web_image }}:latest
            ${{ steps.image-meta.outputs.web_image }}:${{ github.sha }}
          cache-from: type=gha,scope=web-runtime
          cache-to: type=gha,mode=max,scope=web-runtime

      - name: Build and push upscaler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: upscaler-cpu-runtime
          push: true
          tags: |
            ${{ steps.image-meta.outputs.upscaler_image }}:latest
            ${{ steps.image-meta.outputs.upscaler_image }}:${{ github.sha }}
          cache-from: type=gha,scope=upscaler-runtime
          cache-to: type=gha,mode=max,scope=upscaler-runtime

      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          test -n "$DOKPLOY_DEPLOY_WEBHOOK"
          curl --fail --show-error --silent --location --request POST "$DOKPLOY_DEPLOY_WEBHOOK"
